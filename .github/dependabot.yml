version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Pin @types/node to lowest supported runtime (Node 20). Bumping to 22+
      # would let consumers see types from APIs that don't exist on Node 20.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Zod 4 needs MCP SDK 2.x (Standard Schema). Re-enable when SDK 2.x stable lands.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    ignore:
      # Pin to current LTS line; major bumps cross LTS boundaries and want manual review.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
