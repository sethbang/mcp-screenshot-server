name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run test:integration

  linux-e2e:
    name: Linux E2E (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and run Linux e2e tests
        run: |
          docker build -f Dockerfile.linux-test -t mcp-screenshot-linux-test .
          docker run --rm mcp-screenshot-linux-test
